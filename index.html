<style>

.breakdown-wrap{margin:8px 12px;background:var(--bg-card);border-radius:var(--radius-md);box-shadow:var(--shadow-sm);border:1px solid var(--border-light);overflow:hidden}
.breakdown-toggle{display:flex;align-items:center;gap:6px;padding:12px 16px;font-size:11px;color:var(--pri);cursor:pointer;user-select:none}

.drawer{background:var(--bg-card);border-radius:var(--radius-md) var(--radius-md) 0 0;width:100%;max-width:480px;max-height:78vh;overflow-y:auto;padding:0 0 24px;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}

.drawer-header{position:sticky;top:0;background:var(--bg-card);padding:12px 16px;font-size:14px;font-weight:700;border-bottom:1px solid var(--border-light);display:flex;justify-content:space-between;align-items:center;z-index:1}
.drawer-close{width:28px;height:28px;border:none;background:var(--bg);border-radius:50%;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2)}
.drawer-body{padding:12px 16px}.drawer table{width:100%;font-size:10px;border-collapse:collapse}

.drawer table th{background:var(--bg);font-weight:600;font-size:9px;color:var(--text2)}.drawer h4{font-size:12px;margin:12px 0 6px;color:var(--pri)}.drawer .note{font-size:9px;color:var(--text3)}
.bottom-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--bg-card);border-top:1px solid var(--border);display:flex;padding:8px 12px;padding-bottom:calc(8px + env(safe-area-inset-bottom,0px));gap:6px;z-index:20}

.disclaimer{text-align:center;padding:8px 16px 4px;font-size:9px;color:var(--text3);line-height:1.5}
.footer{text-align:center;padding:6px 12px 16px;font-size:9px;color:var(--text3);line-height:1.6}
.fade-in{animation:fadeIn .25s ease}@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}.fold-hd{cursor:pointer;user-select:none;display:flex;align-items:center;gap:8px}.fold-hd:hover{color:var(--pri)}.fold-ar{font-size:10px;transition:transform .2s;display:inline-block;width:14px;text-align:center}

	.share-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:10000;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s}.share-overlay.hidden{display:none}

	.sd-btn-primary{background:#0F766E;color:#fff;box-shadow:0 2px 12px rgba(15,118,110,.25)}.sd-btn-primary:hover{box-shadow:0 4px 16px rgba(15,118,110,.35)}

<script>
// ===== 个税计算器 =====
// var VERSION='0.0';
var COMPREHENSIVE_TAX_BRACKETS=Object.freeze([{maxIncome:36000,rate:.03,quickDeduction:0},{maxIncome:144000,rate:.1,quickDeduction:2520},{maxIncome:300000,rate:.2,quickDeduction:16920},{maxIncome:420000,rate:.25,quickDeduction:31920},{maxIncome:660000,rate:.3,quickDeduction:52920},{maxIncome:960000,rate:.35,quickDeduction:85920},{maxIncome:Infinity,rate:.45,quickDeduction:181920}]);
var BUSINESS_TAX_BRACKETS=Object.freeze([{maxIncome:30000,rate:.05,quickDeduction:0},{maxIncome:90000,rate:.1,quickDeduction:1500},{maxIncome:300000,rate:.2,quickDeduction:10500},{maxIncome:500000,rate:.3,quickDeduction:40500},{maxIncome:Infinity,rate:.35,quickDeduction:65500}]);
var LABOR_WITHHOLDING_BRACKETS=Object.freeze([{maxIncome:20000,rate:.2,quickDeduction:0},{maxIncome:50000,rate:.3,quickDeduction:2000},{maxIncome:Infinity,rate:.4,quickDeduction:7000}]);
var MONTHLY_TAX_BRACKETS=Object.freeze([{maxIncome:3000,rate:.03,quickDeduction:0},{maxIncome:12000,rate:.1,quickDeduction:210},{maxIncome:25000,rate:.2,quickDeduction:1410},{maxIncome:35000,rate:.25,quickDeduction:2660},{maxIncome:55000,rate:.3,quickDeduction:4410},{maxIncome:80000,rate:.35,quickDeduction:7160},{maxIncome:Infinity,rate:.45,quickDeduction:15160}]);
var DEEMED_PROFIT_RATES=Object.freeze({industrial:{label:'工业/交通运输业/商业',min:.05,max:.2,default:.05},construction:{label:'建筑业/房地产开发业',min:.07,max:.2,default:.07},catering:{label:'饮食服务业',min:.07,max:.25,default:.07},entertainment:{label:'娱乐业',min:.2,max:.4,default:.2},other:{label:'其他行业',min:.1,max:.3,default:.1}});
var SPECIAL_ADD_DEDUCTIONS=Object.freeze({infantCare:{label:'3岁以下婴幼儿照护',monthly:2000,note:'每个婴幼儿2000元/月'},childEducation:{label:'子女教育',monthly:2000,note:'每个子女2000元/月'},continuingEduDegree:{label:'继续教育(学历)',monthly:400,note:'学历继续教育期间400元/月'},continuingEduCert:{label:'继续教育(职业资格)',annual:3600,note:'取得证书当年3600元'},seriousIllness:{label:'大病医疗',annualMax:80000,note:'自付超15000元部分，限额80000元/年'},housingLoanInterest:{label:'住房贷款利息',monthly:1000,note:'首套住房，最长240个月'},housingRentTier1:{label:'住房租金(一类)',monthly:1500,note:'直辖市/省会/计划单列市'},housingRentTier2:{label:'住房租金(二类)',monthly:1100,note:'市辖区人口>100万的城市'},housingRentTier3:{label:'住房租金(三类)',monthly:800,note:'市辖区人口≤100万的城市'},elderlyOnlyChild:{label:'赡养老人(独生)',monthly:3000,note:'独生子女3000元/月'},elderlyNonOnlyChild:{label:'赡养老人(非独生)',monthlyMax:1500,note:'非独生子女最高1500元/月'}});
var ANNUAL_BASIC_DEDUCTION=60000,MONTHLY_BASIC_DEDUCTION=5000,FLAT_RATE=.2,HALF_REDUCTION_INCOME_CAP=2000000;
function calcProgressiveTax(t,b){if(t<=0)return{tax:0,rate:0,quickDeduction:0,bracketIndex:-1,taxableIncome:0};for(var i=0;i<b.length;i++){if(t<=b[i].maxIncome){var o=b[i];return{tax:round2(t*o.rate-o.quickDeduction),rate:o.rate,quickDeduction:o.quickDeduction,bracketIndex:i,taxableIncome:t}}}var l=b[b.length-1];return{tax:round2(t*l.rate-l.quickDeduction),rate:l.rate,quickDeduction:l.quickDeduction,bracketIndex:b.length-1,taxableIncome:t}}
function calcExpenseDeduction(t,e){e=e||4000;if(t<=e)return{deduction:e===4000?800:.2*t,method:'fixed',amount:e===4000?800:.2*t};return{deduction:.2*t,method:'rate',amount:.2*t}}
function toLocale(n){return n==null||isNaN(n)?'--':round2(n).toLocaleString('zh-CN',{minimumFractionDigits:2,maximumFractionDigits:2})}
function toWan(n){if(n==null||isNaN(n))return'--';var a=Math.abs(n);return a>=1e8?(n/1e8).toFixed(2)+'亿':a>=1e4?(n/1e4).toFixed(2)+'万':toLocale(n)}
function getVal(id){var e=document.getElementById(id);if(!e)return 0;var v=parseFloat(e.value);return isNaN(v)||v<0?0:v}
function setVal(id,v){var e=document.getElementById(id);if(e)e.value=v!=null?v:''}

function calcSpecialWorkerWithholding(i){var inc=i.income||0,m=i.month||1,prepaid=i.cumulativePrepaidTax||0,isIns=i.type!=='lawyer',cumInc=inc*m,taxable,incomeAmount,cost=0;if(isIns){incomeAmount=cumInc*.8;cost=incomeAmount*.25;taxable=Math.max(0,incomeAmount-cost-MONTHLY_BASIC_DEDUCTION*m)}else{incomeAmount=cumInc*.7;cost=cumInc*.3;taxable=Math.max(0,incomeAmount-MONTHLY_BASIC_DEDUCTION*m-(i.monthSpecial||0)*m-(i.monthSpecialAdd||0)*m-(i.monthOther||0)*m)}var r=calcProgressiveTax(taxable,COMPREHENSIVE_TAX_BRACKETS),curTax=Math.max(0,r.tax-prepaid),bd;if(isIns){bd=['累计佣金收入: '+toWan(cumInc)+' = '+toWan(inc)+' × '+m+'个月','收入额: '+toWan(incomeAmount)+' = '+toWan(cumInc)+' × 80%','展业成本: '+toWan(cost)+' = '+toWan(incomeAmount)+' × 25%','扣除展业成本后: '+toWan(incomeAmount-cost)+' = '+toWan(incomeAmount)+' - '+toWan(cost)]}else{bd=['累计提成收入: '+toWan(cumInc)+' = '+toWan(inc)+' × '+m+'个月','办案费用: '+toWan(cost)+' = '+toWan(cumInc)+' × 30%','扣除办案费后: '+toWan(incomeAmount)+' = '+toWan(cumInc)+' - '+toWan(cost),'累计三险一金: '+toWan((i.monthSpecial||0)*m),'累计专项附加扣除: '+toWan((i.monthSpecialAdd||0)*m),'累计其他扣除: '+toWan((i.monthOther||0)*m)]}bd.push('累计减除费用: '+toWan(MONTHLY_BASIC_DEDUCTION*m)+' ('+m+'个月×5,000)','应纳税所得额: '+toWan(taxable),'应纳税额: '+toWan(r.tax)+' ('+(r.rate*100).toFixed(0)+'% × '+toWan(taxable)+' - '+toWan(r.quickDeduction)+')','本月应预扣: '+toWan(curTax)+' = '+toWan(r.tax)+' - '+toWan(prepaid));return{taxableIncome:taxable,tax:r.tax,currentMonthTax:curTax,rate:r.rate,incomeAmount:incomeAmount,cost:cost,cumulativeIncome:cumInc,breakdown:bd}}
function calcSalaryWithholding(i){var m=i.month,s=i.monthlySalary,cs=i.cumulativeSalary||0,cd=i.cumulativeDeduction||0,csp=i.cumulativeSpecialDeduction||0,csa=i.cumulativeSpecialAddDeduction||0,co=i.cumulativeOtherDeduction||0,cpt=i.cumulativePrepaidTax||0;var cumSal=cs+s,cumDed=cd+MONTHLY_BASIC_DEDUCTION,cumSp=csp+(i.monthSpecialDeduction||0),cumSa=csa+(i.monthSpecialAddDeduction||0),cumO=co+(i.monthOtherDeduction||0),cumT=Math.max(0,cumSal-cumDed-cumSp-cumSa-cumO),r=calcProgressiveTax(cumT,COMPREHENSIVE_TAX_BRACKETS),ct=r.tax,cur=Math.max(0,ct-cpt);return{cumulativeSalary:cumSal,cumulativeDeduction:cumDed,cumulativeTaxableIncome:cumT,cumulativeTax:ct,currentMonthTax:cur,rate:r.rate,quickDeduction:r.quickDeduction,breakdown:['累计收入: '+toWan(cumSal)+' = '+toWan(cs)+' + '+toWan(s),'累计减除费用: '+toWan(cumDed)+' ('+m+'个月 × 5,000元/月)','累计专项扣除: '+toWan(cumSp),'累计专项附加扣除: '+toWan(cumSa),'累计其他扣除: '+toWan(cumO),'累计应纳税所得额: '+toWan(cumT)+' = '+toWan(cumSal)+' - '+toWan(cumDed)+' - '+toWan(cumSp)+' - '+toWan(cumSa)+' - '+toWan(cumO),'累计应纳税额: '+toWan(ct)+' (适用税率'+(r.rate*100).toFixed(0)+'%, 速算扣除数'+toWan(r.quickDeduction)+')','本期应预扣预缴税额: '+toWan(cur)+' = '+toWan(ct)+' - '+toWan(cpt)]}}
function calcLaborServiceWithholding(i){var e=calcExpenseDeduction(i.income),t=Math.max(0,i.income-e.amount),r=calcProgressiveTax(t,LABOR_WITHHOLDING_BRACKETS);return{taxableIncome:t,tax:r.tax,rate:r.rate,expenseDeduction:e.amount,breakdown:['收入: '+toWan(i.income),'减除费用: '+toWan(e.amount)+' ('+(e.method==='fixed'?'定额800元':'定率20%')+')','应纳税所得额: '+toWan(t)+' = '+toWan(i.income)+' - '+toWan(e.amount),'应预扣税额: '+toWan(r.tax)+' ('+(r.rate*100).toFixed(0)+'% × '+toWan(t)+' - '+toWan(r.quickDeduction)+')']}}function calcLaborCumulativeWithholding(i){var inc=i.income||0,m=i.month||1,prepaid=i.cumulativePrepaidTax||0,isPlatform=i.type!=='intern';var cumInc=inc*m,basicDed=MONTHLY_BASIC_DEDUCTION*m,incomeAmount,expense=0,bd;if(isPlatform){expense=cumInc*.2;incomeAmount=cumInc-expense;bd=['累计收入: '+toWan(cumInc)+' = '+toWan(inc)+' × '+m+'个月','减除费用(20%): '+toWan(expense)+' = '+toWan(cumInc)+' × 20%','收入额: '+toWan(incomeAmount)+' = '+toWan(cumInc)+' - '+toWan(expense)]}else{incomeAmount=cumInc;bd=['累计收入: '+toWan(cumInc)+' = '+toWan(inc)+' × '+m+'个月']}var taxable=Math.max(0,incomeAmount-basicDed),r=calcProgressiveTax(taxable,COMPREHENSIVE_TAX_BRACKETS),curTax=Math.max(0,r.tax-prepaid);bd.push('累计减除费用: '+toWan(basicDed)+' ('+m+'个月 × 5,000)','应纳税所得额: '+toWan(taxable),'累计应纳税额: '+toWan(r.tax)+' ('+(r.rate*100).toFixed(0)+'% × '+toWan(taxable)+' - '+toWan(r.quickDeduction)+')','本月应预扣: '+toWan(curTax)+(prepaid>0?' = '+toWan(r.tax)+' - '+toWan(prepaid):''));return{taxableIncome:taxable,tax:r.tax,currentMonthTax:curTax,rate:r.rate,cumulativeTax:r.tax,breakdown:bd}}

function calcBusinessIncomeByAudit(i){var gp=(i.totalRevenue||0)-(i.costs||0)-(i.expenses||0)-(i.losses||0),ti=Math.max(0,gp);if(!i.hasComprehensiveIncome)ti=Math.max(0,ti-(i.annualBasicDeduction||0)-(i.specialDeductionTotal||0)-(i.specialAddDeductionTotal||0)-(i.otherDeductionTotal||0));var r=calcProgressiveTax(ti,BUSINESS_TAX_BRACKETS),bt=r.tax,hr=0;if(i.isSolePropOrIndividual&&ti<=HALF_REDUCTION_INCOME_CAP)hr=round2((bt-(i.otherRelief||0))*.5);var at=Math.max(0,bt-hr-(i.otherRelief||0));return{grossProfit:gp,taxableIncome:ti,halfReduction:hr,tax:at,rate:r.rate,breakdown:['收入总额: '+toWan(i.totalRevenue||0),'成本: '+toWan(i.costs||0),'费用: '+toWan(i.expenses||0),'损失: '+toWan(i.losses||0),'毛利润: '+toWan(gp)+' = '+toWan(i.totalRevenue||0)+' - '+toWan(i.costs||0)+' - '+toWan(i.expenses||0)+' - '+toWan(i.losses||0),i.hasComprehensiveIncome?'有综合所得，不再扣除基本费用及专项扣除':'无综合所得，加扣: 基本减除'+toWan(i.annualBasicDeduction||0)+' + 专项扣除'+toWan(i.specialDeductionTotal||0)+' + 专项附加'+toWan(i.specialAddDeductionTotal||0)+' + 其他'+toWan(i.otherDeductionTotal||0),'应纳税所得额: '+toWan(ti),'原应纳税额: '+toWan(bt)+' ('+(r.rate*100).toFixed(0)+'% × '+toWan(ti)+' - '+toWan(r.quickDeduction)+')',hr>0?'减半优惠: '+toWan(hr)+' (2023-2027, 应纳税所得额≤200万)':'','实际应纳税额: '+toWan(at)].filter(Boolean)}}

function renderResult(r){var c=document.getElementById('resultArea');if(!r||!hasData(r)){c.innerHTML='<div class="result-card" style="background:linear-gradient(135deg,#78716C,#57534E)"><div class="result-label-top">💡 计算结果</div><div class="result-amount" style="font-size:24px;opacity:.7">请输入数据</div><div class="result-meta"><span>填入上方数据，自动显示计算结果</span></div></div>';return}

 if(r.allBreakdowns){c.innerHTML=renderSettlementResult(r);return}
 if(r.combined){c.innerHTML='<div class="result-card"><div class="result-label-top">计算结果</div>'+'<div class="result-row" style="border-color:rgba(255,255,255,.1)"><span style="color:rgba(255,255,255,.7)">缴费可抵扣金额</span><span>'+toWan(r.contributionBenefit.deductibleAmount)+'</span></div>'+'<div class="result-row" style="border-color:rgba(255,255,255,.1)"><span style="color:rgba(255,255,255,.7)">缴费环节节税额</span><span style="color:#6EE7B7;font-weight:700">'+toWan(r.contributionBenefit.taxSaving)+'</span></div>'+'<div class="result-row" style="border-color:rgba(255,255,255,.1)"><span style="color:rgba(255,255,255,.7)">领取时应纳税额</span><span>'+toWan(r.withdrawalTax.tax)+'</span></div>'+'<div class="result-row" style="border-color:rgba(255,255,255,.1)"><span style="color:rgba(255,255,255,.7)">领取时税后金额</span><span>'+toWan(r.withdrawalTax.afterTaxAmount)+'</span></div></div>';return}
 var ma=r._isSimulation?r.totalAnnualTax:r.tax!=null?r.tax:r.currentMonthTax!=null?r.currentMonthTax:r.currentPrepayTax!=null?r.currentPrepayTax:r.supplement>0?r.supplement:r.refund>0?r.refund:0,ac='calc',al=r._isSimulation?(r._totalMonths?'前'+r._totalMonths+'个月累计预扣税':'全年预扣税'):r.refund>0?'应退税额':r.supplement>0?'应补税额':r.currentMonthTax!=null?'本月应预扣':r.currentPrepayTax!=null?'本期应预缴':'应纳税额';if(r.refund>0){ac='refund'}else if(r.supplement>0){ac='owe'}
 var er='';if(r.taxableIncome!=null)er+='<div class="result-row" style="border-color:rgba(255,255,255,.1)"><span style="color:rgba(255,255,255,.7)">应纳税所得额</span><span>'+toWan(r.taxableIncome)+'</span></div>';if(r.rate!=null)er+='<div class="result-row" style="border-color:rgba(255,255,255,.1)"><span style="color:rgba(255,255,255,.7)">适用税率</span><span>'+(r.rate*100).toFixed(0)+'%</span></div>';if(r.cumulativeTax!=null)er+='<div class="result-row" style="border-color:rgba(255,255,255,.1)"><span style="color:rgba(255,255,255,.7)">累计应纳税额</span><span>'+toWan(r.cumulativeTax)+'</span></div>';
 c.innerHTML='<div class="result-card"><div class="result-label-top">'+al+'</div><div class="result-amount '+ac+'">¥ '+toLocale(ma)+'</div>'+(r.halfReduction>0?'<div class="result-meta"><span>减半优惠 -¥'+toLocale(r.halfReduction)+'</span></div>':'')+er+'</div>';
 if(r.breakdown&&r.breakdown.length)c.innerHTML+=renderBreakdown(r.breakdown)
 if(r.months&&r.months.length&&r._monthlySalary)c.innerHTML+=renderSimulation(r)
}
function hasData(r){if(!r)return false;var inputs=document.querySelectorAll('#formArea input[type="number"]');for(var i=0;i<inputs.length;i++){if(inputs[i].value&&inputs[i].value.trim()!=='')return true}if(r._isSimulation&&r._monthlySalary>0)return true;if(r.separateMethod&&(r.separateMethod.bonusTax>0||r.separateMethod.totalTax>0))return true;if(r.contributionBenefit&&(r.contributionBenefit.deductibleAmount>0||r.contributionBenefit.taxSaving>0))return true;return false}
function renderBreakdown(s){if(!s||!s.length)return'';return'<div class="breakdown-wrap"><div class="breakdown-toggle" onclick="this.classList.toggle(\'open\');this.nextElementSibling.classList.toggle(\'show\')"><span class="arrow">▶</span> 查看计算明细</div><div class="breakdown-content">'+s.map(function(x){return'<div class="breakdown-step">'+x+'</div>'}).join('')+'</div></div>'}
function renderSimulation(r){var nMonths=r._totalMonths||12;var h='<div class="result-detail"><div style="font-size:13px;font-weight:600;margin-bottom:8px">累计预扣明细（1–'+nMonths+'月）</div><div class="table-wrap"><table class="sim-table"><thead><tr><th>月份</th><th>月工资</th><th>累计应纳税所得额</th><th>税率</th><th>本月预扣税</th><th>累计预扣税</th></tr></thead><tbody>';r.months.forEach(function(m,i){h+='<tr><td>'+(i+1)+'月</td><td>'+toLocale(r._monthlySalary)+'</td>'+'<td>'+toLocale(m.cumTaxableIncome||0)+'</td>'+'<td>'+(m.rate?(m.rate*100).toFixed(0):'--')+'%</td>'+'<td class="tax-val">'+toLocale(m.tax)+'</td><td>'+toLocale(m.cumTax)+'</td></tr>'});h+='<tr><td>合计</td><td>'+toLocale((r._monthlySalary||0)*nMonths)+'</td><td>—</td><td>—</td>'+'<td class="tax-val">'+toLocale(r.totalAnnualTax||r.cumulativeTax||0)+'</td><td>—</td>'+'</tr></tbody></table></div></div>';return h}
function renderBonusResult(r){var s=r.separateMethod,c=r.combinedMethod,isSep=r.recommendation==='separate',isComb=r.recommendation==='combined',sv=Math.abs(r.savingsWithSeparate),isEq=r._type==='equity',h='<div class="compare-box">'+'<div class="compare-item'+(isSep?' best':'')+'"><div class="compare-label" style="font-weight:600">方式一：单独计税</div><div class="compare-sub">'+(isEq?'股权激励单独计税':'奖金单独计税')+'</div><div class="compare-amount" style="color:'+(isSep?'#059669':'var(--text)')+'">'+toWan(s.bonusTax||s.equityTax||0)+'</div><div class="compare-sub">总税: '+toWan(s.totalTax)+'</div></div>'+'<div class="compare-item'+(isComb?' best':'')+'"><div class="compare-label" style="font-weight:600">方式二：并入综合所得</div><div class="compare-sub">'+(isEq?'股权激励并入全年收入，合并计税':'奖金并入全年收入，合并计税')+'</div><div class="compare-amount" style="color:'+(isComb?'#059669':'var(--text)')+'">'+toWan(c.bonusTax||c.equityTax||0)+'</div><div class="compare-sub">总税: '+toWan(c.totalTax)+'</div></div></div>';if(r.savingsWithSeparate!==0)h+='<div class="saving-banner">建议「'+(isSep?'方式一：单独计税':'并入综合所得')+'」，可节省 <span style="font-size:16px">'+toWan(sv)+'</span> 元</div>';else h+='<div class="saving-banner" style="background:var(--bg);color:var(--text2)">两种方式结果相同</div>';return h}
function renderSettlementResult(r){var h='<div class="result-card">';if(r.refund>0)h+='<div class="result-label-top">汇算结果</div><div class="result-amount refund">¥ '+toLocale(r.refund)+'</div><div class="result-meta"><span>🎉 可申请退税</span></div>';else if(r.supplement>0)h+='<div class="result-label-top">汇算结果</div><div class="result-amount owe">¥ '+toLocale(r.supplement)+'</div><div class="result-meta"><span>⚠️ 需补缴税款</span></div>';else h+='<div class="result-label-top">汇算结果</div><div class="result-amount calc" style="font-size:24px">无需补退税</div>';h+='<div style="margin-top:10px;border-top:1px solid rgba(255,255,255,.1);padding-top:8px;font-size:11px"><div class="result-row" style="border-color:rgba(255,255,255,.1)"><span style="color:rgba(255,255,255,.7)">综合所得收入额</span><span>'+toWan(r.comprehensiveIncomeAmount||0)+'</span></div><div class="result-row" style="border-color:rgba(255,255,255,.1)"><span style="color:rgba(255,255,255,.7)">应纳税所得额</span><span>'+toWan(r.taxableIncome||0)+'</span></div><div class="result-row" style="border-color:rgba(255,255,255,.1)"><span style="color:rgba(255,255,255,.7)">年度应纳税额</span><span>'+toWan(r.annualTax)+'</span></div><div class="result-row" style="border-color:rgba(255,255,255,.1)"><span style="color:rgba(255,255,255,.7)">全年已预缴税额</span><span>'+toWan(r.totalPrepaidTax)+'</span></div><div class="result-row" style="border-color:rgba(255,255,255,.1)"><span style="color:rgba(255,255,255,.7)">适用税率</span><span>'+(r.rate?((r.rate*100).toFixed(0)+'%'):'--')+'</span></div></div></div>';if(r.allBreakdowns)Object.keys(r.allBreakdowns).forEach(function(k){if(r.allBreakdowns[k]&&r.allBreakdowns[k].length)h+=renderBreakdown(r.allBreakdowns[k])});return h}

function runCalculation(){var tab=activeMain,sub=activeSubs[tab],result;try{switch(tab){case'withholding':result=calcWithholding(sub);break;case'settlement':result=calcSettlement();break;case'business':result=calcBusiness(sub);break;case'other':result=calcOther(sub);break;case'special':result=calcSpecial(sub);break}}catch(e){result={}}renderResult(result)}
function calcWithholding(sub){if(sub==='salary'){var me=document.getElementById('sw_mode'),mode=me?me.querySelector('.mode-btn.active')?.dataset?.value:'month';if(mode==='estimate'){var m=Math.max(1,Math.min(12,Math.round(getVal('swe_month')||1)));var s=getVal('swe_salary'),sp=getVal('swe_special'),spa=getVal('swe_specialAdd'),o=getVal('swe_other');var months=[],cs=0,cd=0,csp=0,csa=0,co=0,cpt=0,lastR=null;for(var i=1;i<=m;i++){lastR=calcSalaryWithholding({month:i,monthlySalary:s,monthSpecialDeduction:sp,monthSpecialAddDeduction:spa,monthOtherDeduction:o,cumulativeSalary:cs,cumulativeDeduction:cd,cumulativeSpecialDeduction:csp,cumulativeSpecialAddDeduction:csa,cumulativeOtherDeduction:co,cumulativePrepaidTax:cpt});months.push({month:i,tax:lastR.currentMonthTax,cumTax:lastR.cumulativeTax,cumTaxableIncome:lastR.cumulativeTaxableIncome,rate:lastR.rate});cs=lastR.cumulativeSalary;cd=lastR.cumulativeDeduction;csp=lastR.cumulativeSpecialDeduction;csa=lastR.cumulativeSpecialAddDeduction;co=lastR.cumulativeOtherDeduction;cpt=lastR.cumulativeTax}lastR.months=months;lastR._monthlySalary=s;lastR._sp=sp;lastR._spa=spa;lastR._other=o;lastR._totalMonths=m;lastR.totalAnnualTax=lastR.cumulativeTax;lastR._isSimulation=true;return lastR}if(mode==='precise'){var m2=Math.max(1,Math.min(12,Math.round(getVal('swp_month')||1)));var ci=getVal('swp_cumIncome'),cs2=getVal('swp_cumSpecial'),csa=getVal('swp_cumSpecialAdd'),co=getVal('swp_cumOther'),cp=getVal('swp_cumPrepaid');var fullYear=getChecked('swp_fullYearDed');var basicDed=fullYear?ANNUAL_BASIC_DEDUCTION:MONTHLY_BASIC_DEDUCTION*m2;var taxable=Math.max(0,ci-basicDed-cs2-csa-co);var r=calcProgressiveTax(taxable,COMPREHENSIVE_TAX_BRACKETS);var cur=Math.max(0,r.tax-cp);return{taxableIncome:taxable,tax:r.tax,currentMonthTax:cur,rate:r.rate,cumulativeTax:r.tax,breakdown:['累计收入额: '+toWan(ci),'累计减除费用: '+toWan(basicDed)+(fullYear?' (全年一次性60,000元)':' ('+m2+'个月×5,000)'),'累计专项扣除: '+toWan(cs2),'累计专项附加扣除: '+toWan(csa),'累计其他扣除: '+toWan(co),'应纳税所得额: '+toWan(taxable),'累计应纳税额: '+toWan(r.tax)+' ('+(r.rate*100).toFixed(0)+'% × '+toWan(taxable)+' - '+toWan(r.quickDeduction)+')','本月应预扣: '+toWan(cur)+(cp>0?' = '+toWan(r.tax)+' - '+toWan(cp):'')]}}return calcSalaryWithholding({month:1,monthlySalary:getVal('swm_salary'),monthSpecialDeduction:getVal('swm_special'),monthSpecialAddDeduction:getVal('swm_specialAdd'),monthOtherDeduction:getVal('swm_other')})}else if(sub==='labor'){var lwModeEl=document.getElementById('lw_mode'),lwMode=lwModeEl?lwModeEl.querySelector('.mode-btn.active')?.dataset?.value:'general';if(lwMode==='cumulative')return calcLaborCumulativeWithholding({income:getVal('lw_cum_income'),month:Math.max(1,Math.min(12,Math.round(getVal('lw_cum_month')||1))),cumulativePrepaidTax:getVal('lw_cum_prepaid'),type:document.getElementById('lw_cum_type')?.value||'platform'});return calcLaborServiceWithholding({income:getVal('lw_income')*Math.max(1,round2(getVal('lw_count')||1))})}else if(sub==='royalty')return calcRoyaltyWithholding({income:getVal('rw_income')*Math.max(1,round2(getVal('rw_count')||1))});else if(sub==='authorization')return calcAuthorizationWithholding({income:getVal('aw_income')*Math.max(1,round2(getVal('aw_count')||1))});else if(sub==='nonresident')return calcNonResidentTax({monthlySalary:getVal('nr_salary'),monthlyLabor:getVal('nr_labor'),monthlyRoyalty:getVal('nr_royalty'),monthlyAuthorization:getVal('nr_auth'),monthSpecialDeduction:getVal('nr_specialDed')});else if(sub==='specialWorker'){var swType=document.getElementById('spw_type')?.value||'insurance';return calcSpecialWorkerWithholding({income:getVal('spw_income'),month:Math.max(1,Math.min(12,Math.round(getVal('spw_month')||1))),cumulativePrepaidTax:getVal('spw_prepaid'),type:swType,monthSpecial:getVal('spw_special'),monthSpecialAdd:getVal('spw_specialAdd'),monthOther:getVal('spw_other')})}return{}}
function calcSettlement(){var salary=getVal('as_salary'),labor=getVal('as_labor'),royalty=getVal('as_royalty'),auth=getVal('as_auth'),insurance=getVal('as_insurance'),comp=calcComprehensiveIncome({salaryAmount:salary,laborServiceAmount:labor,royaltyAmount:royalty,authorizationAmount:auth,insuranceAmount:insurance}),taxR=calcAnnualComprehensiveTax({comprehensiveIncomeAmount:comp.total,specialDeductions:{pension:getVal('as_pension'),medical:getVal('as_medical'),unemployment:getVal('as_unemploy'),housingFund:getVal('as_housefund')},specialAddDeductions:{infantCare:getVal('as_infant'),childEducation:getVal('as_childEdu'),continuingEdu:getVal('as_contEdu'),seriousIllness:getVal('as_illness'),housingLoan:getVal('as_loan'),housingRent:getVal('as_rent'),elderlySupport:getVal('as_elderly')},otherDeductions:{annuity:getVal('as_annuity'),commercialHealth:getVal('as_health'),pensionContribution:getVal('as_penPension'),charitableDonation:getVal('as_charity')}}),prepaid=getVal('as_prepaid'),settle=calcSettlementResult(taxR.tax,prepaid);settle.allBreakdowns={'计算明细':comp.breakdown.concat(taxR.breakdown,settle.breakdown)};settle.annualTax=taxR.tax;settle.totalPrepaidTax=prepaid;settle.refund=settle.refund;settle.supplement=settle.supplement;settle.taxableIncome=taxR.taxableIncome;settle.rate=taxR.rate;settle.comprehensiveIncomeAmount=comp.total;return settle}
function calcBusiness(sub){if(sub==='audit'){var me=document.getElementById('audit_mode'),mode=me?me.querySelector('.mode-btn.active')?.dataset?.value:'prepay';if(mode==='annual')return calcBusinessIncomeByAudit({totalRevenue:getVal('ba_revenue'),costs:getVal('ba_costs'),expenses:getVal('ba_expenses'),losses:getVal('ba_losses'),otherRelief:getVal('ba_otherRelief'),hasComprehensiveIncome:getChecked('ba_hasComprehensive'),annualBasicDeduction:getVal('ba_basicDed'),specialDeductionTotal:getVal('ba_specialDed'),specialAddDeductionTotal:getVal('ba_specialAddDed'),otherDeductionTotal:getVal('ba_otherDed'),isSolePropOrIndividual:getChecked('ba_isIndividual')});return calcBusinessPrepayment({month:Math.max(1,Math.min(4,round2(getVal('bp_month')||1))),cumulativeRevenue:getVal('bp_cumRevenue'),cumulativeCosts:getVal('bp_cumCosts'),cumulativeExpenses:getVal('bp_cumExpenses'),cumulativeLosses:getVal('bp_cumLosses'),cumulativePrepaidTax:getVal('bp_prepaidTax'),otherRelief:getVal('bp_otherRelief'),isIndividual:getChecked('bp_isIndividual')})}else if(sub==='deemed'){var ratePct=getVal('bd_deemedRate'),deemR=ratePct>1?ratePct/100:ratePct;return calcBusinessIncomeByDeemed({totalRevenue:getVal('bd_revenue'),deemedRate:deemR||.05,otherRelief:getVal('bd_otherRelief'),isIndividual:getChecked('bd_isIndividual')})}return{}}
function calcOther(sub){if(sub==='rental')return calcPropertyRentalTax({monthlyRent:getVal('pr_rent'),taxesAndFees:getVal('pr_taxes'),repairCost:getVal('pr_repair'),priorRemainingRepair:getVal('pr_priorRepair'),isResidentialHousing:getChecked('pr_isHousing')});if(sub==='transfer')return calcPropertyTransferTax({transferIncome:getVal('pt_income'),originalCost:getVal('pt_original'),reasonableExpenses:getVal('pt_expenses')});if(sub==='dividend')return calcDividendTax({dividendAmount:getVal('div_amount'),holdingMonths:getVal('div_holdingMonths'),isListed:getChecked('div_isListed')});if(sub==='occasional')return calcOccasionalIncomeTax({income:getVal('oc_income'),type:document.getElementById('oc_type')?.value||'lottery'});return{}}

	function roundRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath()}

 assert('例5-3',calcSalaryWithholding,{month:1,monthlySalary:10000,monthSpecialDeduction:1500,monthSpecialAddDeduction:1000,monthOtherDeduction:0},75,'currentMonthTax');assert('例5-7',calcLaborServiceWithholding,{income:40000},7600);assert('股息',calcDividendTax,{dividendAmount:10000,holdingMonths:6,isListed:true},1000);assert('财产租赁',calcPropertyRentalTax,{monthlyRent:4500,isResidentialHousing:true},360);assert('例5-8',calcRoyaltyWithholding,{income:20000},2240);assert('股息>12月免税',calcDividendTax,{dividendAmount:10000,holdingMonths:13,isListed:true},0);assert('例5-15',calcPropertyTransferTax,{transferIncome:600000,originalCost:410000,reasonableExpenses:35000},31000);assert('例5-17',calcAnnualBonusSeparate,{bonusAmount:60000},5790);
 console.log('%c===== 教材例题验证 =====','font-weight:bold');tests.forEach(function(t){console.log('%c'+t.example+': '+(t.ok?'✅':'❌')+' 实际='+t.actual,t.ok?'color:green':'color:red')});console.log('%c通过: '+pass+'/失败: '+fail,'font-weight:bold')}
